server {
    listen 80;
    
    # Root directory and index file
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS server
    resolver 127.0.0.11 valid=30s;

    # Reverse proxy for API requests
    location /api/ {
        # Using variable to prevent Nginx from crashing if backend is not ready yet
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files and fallback to index.html for SPA routing (React Router/Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
