version: "3.9"

services:
  frontend:
    build: .
    container_name: fsub-frontend
    restart: unless-stopped
    ports:
      - "8080:80"  # Menyesuaikan dengan port yang Anda gunakan di Cloud Shell (8080)
    networks:
      - bot_default

networks:
  bot_default:
    external: true
    # Jika nama network backend Anda berbeda, ganti 'bot_default' di atas dan di bawah dengan nama yang benar.
