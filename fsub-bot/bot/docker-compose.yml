version: "3.9"

services:
  # ── Telegram Bot ─────────────────────────────────────────────
  bot:
    build: .
    container_name: fsub-bot
    restart: unless-stopped
    command: [ "python", "main.py", "bot" ]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./sessions:/home/botuser/app/sessions
    networks:
      - fsub-net

  # ── API Server ───────────────────────────────────────────────
  api:
    build: .
    container_name: fsub-api
    restart: unless-stopped
    command: [ "python", "main.py", "api" ]
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fsub-net

  # ── Background Worker ────────────────────────────────────────
  worker:
    build: .
    container_name: fsub-worker
    restart: unless-stopped
    command: [ "python", "main.py", "worker" ]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fsub-net

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fsub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fsub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-fsub_bot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fsub_user} -d ${POSTGRES_DB:-fsub_bot}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fsub-net

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fsub-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru" ]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fsub-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  fsub-net:
    driver: bridge
